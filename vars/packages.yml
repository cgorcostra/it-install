    state: present
  - name: docker-buildx-plugin
    state: present
  - name: docker-compose-plugin
    state: present
  - name: git
    state: present
  - name: vim
    state: latest
  - name: gnome-text-editor
    state: latest
  - name: gedit
    state: latest
  - name: apt-transport-https
