    type: "stable"
    key: https://download.docker.com/linux/ubuntu/gpg
    uri: https://download.docker.com/linux/ubuntu


deb:
  - uri: https://go.microsoft.com/fwlink/?LinkID=760868
    name: vsc

rm_packages:
  - docker.io 
  - docker-compose 
  - docker-compose-v2 
  - docker-doc 
  - podman-docker 
  - containerd 
  - runc

install_packages:
